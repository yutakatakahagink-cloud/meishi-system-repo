<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>名刺印刷システム</title>
    <script src="config.js" onerror=""></script>
    <script>
      if (location.protocol === "file:") {
        var base = window.MEISHI_BASE_URL || "https://yutakatakahagink-cloud.github.io/meishi-system-repo/";
        location.replace(base.replace(/\/?$/, "/"));
      }
    </script>
    <style>
      :root{--brand:#2f5597;--brand-d:#21406f;--bg:#eef2f7;--line:#d6dde8}
      *{box-sizing:border-box}body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Meiryo",system-ui,sans-serif;background:var(--bg);color:#1c2533}
      header{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;padding:14px 18px}
      header h1{font-size:1.05rem;margin:0}
      .wrap{max-width:760px;margin:0 auto;padding:24px 16px}
      .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
      @media(max-width:560px){.grid{grid-template-columns:1fr}}
      a.tile{display:block;text-decoration:none;background:#fff;border:1px solid var(--line);border-radius:16px;padding:34px 18px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.07);color:inherit}
      a.tile:hover{transform:translateY(-3px);box-shadow:0 10px 22px rgba(0,0,0,.12)}
      .ico{font-size:2.8rem}.ttl{font-size:1.2rem;font-weight:700;margin-top:8px;color:var(--brand-d)}
      .sub{font-size:.82rem;color:#7b8698;margin-top:4px}
    </style>
  </head>
  <body>
    <header><h1>名刺印刷システム</h1></header>
    <div class="wrap">
      <div class="grid">
        <a class="tile" href="owner.html"><div class="ico">⚙️</div><div class="ttl">所有者ページ</div><div class="sub">ログインID/パスワードの設定・使用者URLの発行</div></a>
        <a class="tile" href="user.html"><div class="ico">🖨️</div><div class="ttl">使用者ページ</div><div class="sub">ログイン→名刺の選択・デザイン・印刷</div></a>
      </div>
    </div>
  </body>
</html>
