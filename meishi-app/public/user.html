<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>名刺印刷システム</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="config.js" onerror="console.info('[Meishi] config.js なし → localStorage モード')"></script>
    <script src="meishi-fields.js?v=20250714p"></script>
    <script src="meishi-catalog.js?v=20250715d"></script>
    <script src="meishi-store.js?v=20250723a"></script>
    <link rel="stylesheet" href="meishi-print-sheet.css?v=20250714z" />
    <link rel="stylesheet" href="owner.css?v=20250714z" />
    <style>
      .view{display:none}.view.active{display:block}
      header .header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
      .login-card{max-width:380px;margin:8vh auto 0;background:#fff;border-radius:16px;padding:30px 26px;box-shadow:0 10px 30px rgba(0,0,0,.12)}
      .login-card h2{margin:0 0 6px;color:var(--brand-d)}
    </style>
  </head>
  <body>
    <header>
      <h1 id="appTitle">名刺印刷システム</h1>
      <div class="header-actions">
        <span class="badge" id="syncBadge">…</span>
        <button class="btn sm ghost" type="button" id="btnLogout" style="display:none">ログアウト</button>
      </div>
    </header>
    <div class="wrap">
      <!-- ログイン -->
      <section id="view-login" class="view active">
        <div class="login-card">
          <h2>ログイン</h2>
          <p id="loginStatus" class="hint" style="margin-top:0">設定を読み込み中…</p>
          <div class="field"><label>ID</label><input id="loginId" type="text" autocomplete="username" /></div>
          <div class="field"><label>パスワード</label><input id="loginPass" type="password" autocomplete="current-password" /></div>
          <label class="hint login-remember" style="display:flex;align-items:center;gap:8px;margin:4px 0 14px;cursor:pointer;white-space:nowrap;font-weight:500">
            <input type="checkbox" id="loginRemember" style="width:auto;margin:0;flex:0 0 auto" />
            <span>IDとパスワードを保存する</span>
          </label>
          <button class="btn" style="display:block;width:100%" id="btnLogin">ログイン</button>
        </div>
      </section>

      <!-- プレビュー（所有者プレビュー画面と同一） -->
      <section id="view-editor" class="view">
        <div class="card">
          <div class="btn-row preview-toolbar">
            <h2 style="margin:0;flex:1">名刺印刷プレビュー</h2>
            <button type="button" class="btn sm ghost" id="pvBtnImages">＋画像</button>
            <button type="button" class="btn sm ghost" id="pvBtnSavePersonal">個人画像を保存</button>
            <button type="button" class="btn sm" id="pvBtnPrint">🖨️ 印刷（A4・両面10面）</button>
          </div>
          <p id="pvPersonalHint" class="hint" style="margin-top:0"></p>
          <div id="pvPersonalImgList" class="img-list" style="margin:6px 0 10px"></div>
          <p class="hint">A4用紙に名刺10枚（91×55mm・ラベル屋さん51003相当）。1枚目＝表面、2枚目＝裏面です。倍率100%・余白なし・背景グラフィックON。両面は短辺とじで裏返してから2枚目を印刷してください。</p>
          <div class="print-editor">
            <div class="print-panel card inner">
              <div class="btn-row" style="align-items:center;margin-bottom:8px">
                <h3 style="margin:0;flex:1">項目を選択</h3>
                <button type="button" class="btn sm ghost" id="pvBtnClear">クリア</button>
              </div>
              <div class="field field-name-combo">
                <label>氏名</label>
                <div class="name-combo" id="pvNameCombo">
                  <input type="text" id="pvSelName" placeholder="氏名を選択・検索" autocomplete="off" spellcheck="false" role="combobox" aria-autocomplete="list" aria-expanded="false" />
                  <button type="button" class="name-combo-toggle" id="pvSelNameToggle" aria-label="氏名一覧を開く" tabindex="-1">▼</button>
                  <ul class="name-combo-list" id="pvSelNameList" hidden></ul>
                </div>
              </div>
              <div class="field"><label>会社・団体名</label><select id="pvSelCompany"></select></div>
              <div class="field"><label>所属1</label><select id="pvSelAff1"></select></div>
              <div class="field"><label>所属2</label><select id="pvSelAff2"></select></div>
              <div class="field"><label>所属3</label><select id="pvSelAff3"></select></div>
              <div class="field"><label>役職</label><select id="pvSelTitle"></select></div>
              <div class="field"><label>資格</label><input id="pvInQual" placeholder="直接入力" /></div>
              <div class="field"><label>郵便番号</label><select id="pvSelPostal"></select></div>
              <div class="field"><label>住所（自動）</label><input id="pvInAddress" readonly /></div>
              <div class="grid2">
                <div class="field"><label>TEL（自動）</label><input id="pvInTel" readonly /></div>
                <div class="field"><label>FAX（自動）</label><input id="pvInFax" readonly /></div>
              </div>
              <div class="field"><label>携帯</label><select id="pvSelMobile"></select></div>
              <div class="field"><label>メール</label><input id="pvInEmail" placeholder="直接入力" /></div>
              <div class="field"><label>URL（自動）</label><input id="pvInUrl" readonly /></div>
              <div class="field"><label>工事件名（任意）</label><input id="pvInKoji" placeholder="例: 令和○年度 ○○工事" /></div>
            </div>
            <div class="print-stagewrap">
              <div class="seg card-side-toggle" id="pvSideToggle">
                <button type="button" data-side="front" class="on">表</button>
                <button type="button" data-side="back">裏</button>
              </div>
              <div class="hint" id="pvSideHint">個人画像は氏名を選ぶと表示・印刷されます</div>
              <div id="pvPrintArea">
                <div class="preview-scale-box preview-scale-box--stack" id="pvFrontWrap">
                  <div class="stage stack">
                    <div class="meishi under print-readonly" id="pvCard"></div>
                    <div class="meishi over" id="pvCardPersonal"></div>
                  </div>
                </div>
                <div class="preview-scale-box preview-scale-box--back" id="pvBackWrap" style="display:none">
                  <div class="stage">
                    <div class="meishi print-readonly" id="pvCardBack"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      function show(v) {
        document.querySelectorAll(".view").forEach(function (s) { s.classList.remove("active"); });
        document.getElementById("view-" + v).classList.add("active");
      }

      var EDITOR_SCRIPTS = [
        "meishi-layout.js?v=20250714q",
        "meishi-image-lib.js?v=20250714ad",
        "meishi-card-ui.js?v=20250715k",
        "meishi-back-card-ui.js?v=20250714z",
        "meishi-print-sheet.js?v=20250714z",
        "meishi-user-print.js?v=20250715k",
        "meishi-preview-init.js?v=20250715m",
      ];
      var previewPanel = null;
      var editorScriptsPromise = null;

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          var s = document.createElement("script");
          s.src = src;
          s.onload = function () { resolve(); };
          s.onerror = function () { reject(new Error("script load failed: " + src)); };
          document.head.appendChild(s);
        });
      }

      function ensureEditorScripts() {
        if (previewPanel) return Promise.resolve();
        if (editorScriptsPromise) return editorScriptsPromise;
        editorScriptsPromise = EDITOR_SCRIPTS.reduce(function (p, src) {
          return p.then(function () { return loadScript(src); });
        }, Promise.resolve()).then(function () {
          previewPanel = MeishiPreviewPanel.create({
            isActive: function () {
              return document.getElementById("view-editor").classList.contains("active");
            },
            onPersonalSaved: function (msg) { alert(msg); },
          });
        });
        return editorScriptsPromise;
      }

      async function openEditor() {
        setLoginStatus("編集画面を準備中…");
        if (!MeishiStore.ready) {
          try { await MeishiStore.init(); } catch (e) { alert(e.message || e); return; }
        }
        try { await ensureEditorScripts(); } catch (e) {
          alert("画面の読み込みに失敗しました。再読み込みしてください。\n" + (e.message || e));
          return;
        }
        show("editor");
        previewPanel.init();
      }

      var SK = "meishi_user_login";
      var REMEMBER_KEY = "meishi_user_saved_login";
      var loginReady = false;
      var loggingIn = false;

      function setLoginEnabled(on) {
        document.getElementById("loginId").disabled = !on;
        document.getElementById("loginPass").disabled = !on;
        document.getElementById("btnLogin").disabled = !on;
      }

      function setLoginStatus(msg) {
        var el = document.getElementById("loginStatus");
        if (el) el.textContent = msg || "";
      }

      function restoreSavedLogin() {
        try {
          var raw = localStorage.getItem(REMEMBER_KEY);
          if (!raw) return;
          var d = JSON.parse(raw);
          if (!d || typeof d !== "object") return;
          document.getElementById("loginId").value = d.id || "";
          document.getElementById("loginPass").value = d.pw || "";
          var chk = document.getElementById("loginRemember");
          if (chk) chk.checked = true;
        } catch (e) {}
      }

      function persistLoginRemember(id, pw) {
        var chk = document.getElementById("loginRemember");
        if (chk && chk.checked) {
          try {
            localStorage.setItem(REMEMBER_KEY, JSON.stringify({ id: id, pw: pw }));
          } catch (e) {}
        } else {
          try { localStorage.removeItem(REMEMBER_KEY); } catch (e2) {}
        }
      }

      function applyTitleAndBadge() {
        var c = MeishiStore.getConfig();
        document.getElementById("appTitle").textContent = c.title || "名刺印刷システム";
        document.title = c.title || "名刺印刷システム";
        setBadge();
      }

      function defaultLoginStatus() {
        if (MeishiStore.useFirebase() && !MeishiStore.firebaseAuthLoaded()) {
          return "サーバー同期未完了です。ローカル保存の ID / パスワードがあれば入力できます。";
        }
        return "所有者が設定した ID / パスワードを入力してください。";
      }

      async function doLogin() {
        if (loggingIn) return;
        if (!loginReady && !MeishiStore.authReady) {
          alert("設定を読み込み中です。少し待ってから再度お試しください。");
          return;
        }
        var id = document.getElementById("loginId").value;
        var pw = document.getElementById("loginPass").value;
        loggingIn = true;
        setLoginEnabled(false);
        try {
          if (MeishiStore.useFirebase() && MeishiStore.refreshAuthFromFirebase) {
            setLoginStatus("ログイン情報を確認中…");
            try { await MeishiStore.refreshAuthFromFirebase(); } catch (e) {}
            setBadge();
          }
          if (!MeishiStore.verifyUserLogin(id, pw)) {
            var hint = "";
            if (MeishiStore.useFirebase() && !MeishiStore.firebaseAuthLoaded()) {
              hint = "\n\n※ ログイン情報をサーバーから取得できていません。\n" +
                "所有者が本番URL（owner.html）を開き「基本・URL」で保存してください。";
            }
            alert("IDまたはパスワードが違います。" + hint);
            setLoginStatus(defaultLoginStatus());
            return;
          }
          persistLoginRemember(id, pw);
          sessionStorage.setItem(SK, "1");
          document.getElementById("btnLogout").style.display = "";
          await openEditor();
        } finally {
          loggingIn = false;
          if (document.getElementById("view-login").classList.contains("active")) {
            setLoginEnabled(true);
            setLoginStatus(defaultLoginStatus());
          }
        }
      }
      document.getElementById("btnLogin").addEventListener("click", doLogin);
      document.getElementById("loginPass").addEventListener("keydown", function (e) { if (e.key === "Enter") doLogin(); });
      document.getElementById("btnLogout").addEventListener("click", function () {
        sessionStorage.removeItem(SK);
        this.style.display = "none";
        show("login");
        restoreSavedLogin();
        setLoginEnabled(true);
        setLoginStatus(defaultLoginStatus());
      });

      function setBadge() {
        var b = document.getElementById("syncBadge");
        if (MeishiStore.useFirebase() && MeishiStore.firebaseAuthLoaded()) {
          b.textContent = "全端末で共有中";
          b.style.background = "rgba(40,180,99,.35)";
        } else if (MeishiStore.useFirebase()) {
          b.textContent = "同期未完了";
          b.style.background = "rgba(243,156,18,.35)";
        } else {
          b.textContent = "この端末のみ";
          b.style.background = "rgba(243,156,18,.35)";
        }
      }

      (async function () {
        // 入力欄は最初から有効（重い init 完了を待たない）
        setLoginEnabled(true);
        restoreSavedLogin();
        setLoginStatus("ログイン情報を取得中…（入力できます）");
        show("login");
        try {
          if (MeishiStore.initAuthFast) await MeishiStore.initAuthFast();
        } catch (e) { console.warn(e); }
        loginReady = true;
        applyTitleAndBadge();
        setLoginStatus(defaultLoginStatus());
        MeishiStore.onConfigChange(function (cc) {
          document.getElementById("appTitle").textContent = cc.title || "名刺印刷システム";
          setBadge();
          if (MeishiStore.firebaseAuthLoaded() && document.getElementById("view-login").classList.contains("active")) {
            setLoginStatus("所有者が設定した ID / パスワードを入力してください。");
          }
        });
        // 名刺データ等は裏で読み込み（ログイン入力と並列）
        void MeishiStore.init().then(function () {
          applyTitleAndBadge();
          if (document.getElementById("view-login").classList.contains("active")) {
            setLoginStatus(defaultLoginStatus());
          }
        }).catch(function (e) { console.warn("[Meishi] init", e); });
        // 編集用スクリプトも裏で先読み
        void ensureEditorScripts().catch(function () {});
        if (sessionStorage.getItem(SK) === "1") {
          document.getElementById("btnLogout").style.display = "";
          await openEditor();
        }
      })();
    </script>
  </body>
</html>
