<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>名刺印刷システム</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="config.js" onerror="console.info('[Meishi] config.js なし → localStorage モード')"></script>
    <script src="meishi-fields.js"></script>
    <script src="meishi-catalog.js?v=20250617g"></script>
    <script src="meishi-store.js?v=20250617j"></script>
    <script src="meishi-layout.js?v=20250617x"></script>
    <script src="meishi-image-lib.js?v=20250617j"></script>
    <script src="meishi-card-ui.js?v=20250617p"></script>
    <script src="meishi-back-card-ui.js?v=20250617y"></script>
    <script src="meishi-print-sheet.js?v=20250617z"></script>
    <script src="meishi-user-print.js?v=20250617z"></script>
    <script src="meishi-preview-init.js?v=20250617t"></script>
    <link rel="stylesheet" href="meishi-print-sheet.css?v=20250617z" />
    <link rel="stylesheet" href="owner.css?v=20250617y" />
    <style>
      .view{display:none}.view.active{display:block}
      header .header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
      .login-card{max-width:380px;margin:8vh auto 0;background:#fff;border-radius:16px;padding:30px 26px;box-shadow:0 10px 30px rgba(0,0,0,.12)}
      .login-card h2{margin:0 0 6px;color:var(--brand-d)}
    </style>
  </head>
  <body>
    <header>
      <h1 id="appTitle">名刺印刷システム</h1>
      <div class="header-actions">
        <span class="badge" id="syncBadge">…</span>
        <button class="btn sm ghost" type="button" id="btnLogout" style="display:none">ログアウト</button>
      </div>
    </header>
    <div class="wrap">
      <!-- ログイン -->
      <section id="view-login" class="view active">
        <div class="login-card">
          <h2>ログイン</h2>
          <div class="field"><label>ID</label><input id="loginId" type="text" /></div>
          <div class="field"><label>パスワード</label><input id="loginPass" type="password" /></div>
          <button class="btn" style="width:100%" id="btnLogin">ログイン</button>
        </div>
      </section>

      <!-- プレビュー（所有者プレビュー画面と同一） -->
      <section id="view-editor" class="view">
        <div class="card">
          <div class="btn-row preview-toolbar">
            <h2 style="margin:0;flex:1">名刺印刷プレビュー</h2>
            <button type="button" class="btn sm ghost" id="pvBtnImages">＋画像</button>
            <button type="button" class="btn sm ghost" id="pvBtnSavePersonal">個人画像を保存</button>
            <button type="button" class="btn sm ghost" id="pvBtnClear">クリア</button>
            <button type="button" class="btn sm" id="pvBtnPrint">🖨️ 印刷（A4・両面10面）</button>
          </div>
          <p id="pvPersonalHint" class="hint" style="margin-top:0"></p>
          <p class="hint">A4用紙に名刺10枚（91×55mm・ラベル屋さん51003相当）。1枚目＝表面、2枚目＝裏面です。倍率100%・余白なし・背景グラフィックON。両面は短辺とじで裏返してから2枚目を印刷してください。</p>
          <div class="print-editor">
            <div class="print-panel card inner">
              <h3>項目を選択</h3>
              <div class="field"><label>氏名</label><select id="pvSelName"></select></div>
              <div class="field"><label>会社・団体名</label><select id="pvSelCompany"></select></div>
              <div class="field"><label>所属1</label><select id="pvSelAff1"></select></div>
              <div class="field"><label>所属2</label><select id="pvSelAff2"></select></div>
              <div class="field"><label>所属3</label><select id="pvSelAff3"></select></div>
              <div class="field"><label>役職</label><select id="pvSelTitle"></select></div>
              <div class="field"><label>資格（自動）</label><input id="pvInQual" readonly /></div>
              <div class="field"><label>郵便番号</label><select id="pvSelPostal"></select></div>
              <div class="field"><label>住所（自動）</label><input id="pvInAddress" readonly /></div>
              <div class="grid2">
                <div class="field"><label>TEL（自動）</label><input id="pvInTel" readonly /></div>
                <div class="field"><label>FAX（自動）</label><input id="pvInFax" readonly /></div>
              </div>
              <div class="field"><label>携帯（自動）</label><input id="pvInMobile" readonly /></div>
              <div class="field"><label>メール（自動）</label><input id="pvInEmail" readonly /></div>
              <div class="field"><label>URL（自動）</label><input id="pvInUrl" readonly /></div>
              <div class="field"><label>工事件名（任意）</label><input id="pvInKoji" placeholder="例: 令和○年度 ○○工事" /></div>
            </div>
            <div class="print-stagewrap">
              <div class="seg card-side-toggle" id="pvSideToggle">
                <button type="button" data-side="front" class="on">表</button>
                <button type="button" data-side="back">裏</button>
              </div>
              <div class="hint" id="pvSideHint">個人画像は氏名を選ぶと表示・印刷されます</div>
              <div id="pvPrintArea">
                <div class="preview-scale-box preview-scale-box--stack" id="pvFrontWrap">
                  <div class="stage stack">
                    <div class="meishi under print-readonly" id="pvCard"></div>
                    <div class="meishi over" id="pvCardPersonal"></div>
                  </div>
                </div>
                <div class="preview-scale-box" id="pvBackWrap" style="display:none">
                  <div class="stage">
                    <div class="meishi print-readonly" id="pvCardBack"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      function show(v) {
        document.querySelectorAll(".view").forEach(function (s) { s.classList.remove("active"); });
        document.getElementById("view-" + v).classList.add("active");
      }

      var previewPanel = MeishiPreviewPanel.create({
        isActive: function () {
          return document.getElementById("view-editor").classList.contains("active");
        },
        onPersonalSaved: function (msg) { alert(msg); },
      });

      function openEditor() {
        show("editor");
        previewPanel.init();
      }

      var SK = "meishi_user_login";
      function doLogin() {
        var c = MeishiStore.getConfig();
        var id = document.getElementById("loginId").value.trim();
        var pw = document.getElementById("loginPass").value;
        if (id === (c.ownerId || "") && pw === (c.ownerPass || "")) {
          sessionStorage.setItem(SK, "1");
          document.getElementById("btnLogout").style.display = "";
          openEditor();
        } else alert("IDまたはパスワードが違います。");
      }
      document.getElementById("btnLogin").addEventListener("click", doLogin);
      document.getElementById("loginPass").addEventListener("keydown", function (e) { if (e.key === "Enter") doLogin(); });
      document.getElementById("btnLogout").addEventListener("click", function () {
        sessionStorage.removeItem(SK);
        this.style.display = "none";
        show("login");
      });

      function setBadge() {
        var b = document.getElementById("syncBadge");
        if (MeishiStore.useFirebase()) {
          b.textContent = "全端末で共有中";
          b.style.background = "rgba(40,180,99,.35)";
        } else {
          b.textContent = "この端末のみ";
          b.style.background = "rgba(243,156,18,.35)";
        }
      }

      (async function () {
        try { await MeishiStore.init(); } catch (e) { alert(e.message || e); }
        var c = MeishiStore.getConfig();
        document.getElementById("appTitle").textContent = c.title || "名刺印刷システム";
        document.title = c.title || "名刺印刷システム";
        setBadge();
        MeishiStore.onConfigChange(function (cc) {
          document.getElementById("appTitle").textContent = cc.title || "名刺印刷システム";
        });
        if (sessionStorage.getItem(SK) === "1") {
          document.getElementById("btnLogout").style.display = "";
          openEditor();
        } else show("login");
      })();
    </script>
  </body>
</html>
